appId: com.wraeclastledger.app
productName: WraeclastLedger

publish:
  provider: github
  owner: gund0lf
  repo: wraeclastledger_react
  private: false   # public repo — electron-updater can check releases without a token
  releaseType: release

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: WraeclastLedger

files:
  - out/**/*
  - "!out/**/*.map"

directories:
  output: dist
  buildResources: resources
